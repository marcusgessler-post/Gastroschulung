<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HACCP Schulungsportal</title>


<style>
:root {
  --bg:       #f2f0eb;
  --surface:  #ffffff;
  --surface2: #f8f7f3;
  --border:   #e2e0d8;
  --text:     #1a1916;
  --muted:    #6b6960;
  --accent:   #1a3a2a;
  --accent2:  #2d5c41;
  --ok:       #1e6b3e;
  --ok-bg:    #e8f5ee;
  --err:      #8b1a1a;
  --err-bg:   #fdf0f0;
  --info:     #1a3a6b;
  --info-bg:  #eef3fd;
  --warn-bg:  #fdf6e8;
  --warn:     #7a4f0d;
  --r:        10px;
  --r-sm:     6px;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
a{color:var(--accent2)}

/* ── Layout ── */
.shell{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--accent);color:#fff;padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Courier New',Courier,monospace;font-size:13px;letter-spacing:.08em;opacity:.9;white-space:nowrap}
.topbar-title{font-size:14px;font-weight:500;white-space:nowrap}
.topbar-sep{opacity:.25;flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.progress-wrap{height:3px;background:rgba(255,255,255,.15);position:relative}
.progress-fill{height:100%;background:rgba(255,255,255,.6);transition:width .4s ease}
.main{flex:1;padding:2rem 1rem;max-width:720px;width:100%;margin:0 auto}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.25rem}
.card-sm{padding:1rem 1.25rem}

/* ── Typography ── */
.label{font-family:'Courier New',Courier,monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:.375rem}
.heading{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:.5rem}
.subtext{font-size:14px;color:var(--muted);line-height:1.65}
.section-title{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:.875rem}

/* ── Forms ── */
.fg{margin-bottom:1rem}
.fg:last-child{margin-bottom:0}
input[type=text],input[type=email],select{width:100%;padding:.625rem .875rem;border:1px solid var(--border);border-radius:var(--r-sm);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;color:var(--text);background:var(--surface2);transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(45,92,65,.1)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-adr{display:grid;grid-template-columns:110px 1fr;gap:1rem}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;border-radius:var(--r-sm);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:#c8c6be}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-success{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-success:hover{filter:brightness(1.1)}
.nav-row{display:flex;gap:.75rem;justify-content:space-between;margin-top:1.25rem}

/* ── Alerts ── */
.alert{padding:.75rem 1rem;border-radius:var(--r-sm);font-size:13px;line-height:1.55;margin-bottom:.875rem;border:1px solid}
.alert-info{background:var(--info-bg);color:var(--info);border-color:#c8d7f5}
.alert-ok{background:var(--ok-bg);color:var(--ok);border-color:#b8dfc8}
.alert-err{background:var(--err-bg);color:var(--err);border-color:#f0c8c8}
.alert-warn{background:var(--warn-bg);color:var(--warn);border-color:#e8d8b0}

/* ── Module grid ── */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.875rem}
.mod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1.125rem;cursor:pointer;transition:all .2s;position:relative}
.mod-card:hover:not(.locked){border-color:var(--accent2);box-shadow:0 2px 12px rgba(45,92,65,.12);transform:translateY(-1px)}
.mod-card.next{border-color:var(--accent2);background:linear-gradient(135deg,#fff 0%,#f0f7f2 100%)}
.mod-card.done{border-color:var(--ok);background:var(--ok-bg)}
.mod-card.locked{opacity:.45;cursor:not-allowed}
.mod-num{font-family:'Courier New',Courier,monospace;font-size:11px;color:var(--muted);letter-spacing:.08em}
.mod-title{font-size:14px;font-weight:500;margin:.25rem 0 .375rem;line-height:1.35}
.mod-meta{font-size:12px;color:var(--muted)}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;font-family:'Courier New',Courier,monospace}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-next{background:var(--info-bg);color:var(--info)}
.badge-neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* ── Content viewer ── */
.content-text{font-size:15px;line-height:1.8;color:var(--text);white-space:pre-line}
.content-text strong{font-weight:600;color:var(--accent)}

/* ── Progress dots ── */
.dots{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .25s}
.dot.active{background:var(--accent2);width:24px;border-radius:4px}
.dot.done-dot{background:var(--ok)}

/* ── Quiz ── */
.q-option{display:block;width:100%;text-align:left;padding:.75rem 1rem;margin-bottom:.625rem;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;color:var(--text);cursor:pointer;transition:all .18s;line-height:1.45}
.q-option:hover:not(:disabled){border-color:var(--accent2);background:#f0f7f2}
.q-option:disabled{cursor:not-allowed}
.q-option.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);font-weight:500}
.q-option.wrong{background:var(--err-bg);border-color:var(--err);color:var(--err)}

/* ── Checklist row ── */
.check-row{display:flex;align-items:flex-start;gap:.75rem;padding:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;margin-top:.875rem;transition:border-color .15s}
.check-row:hover{border-color:var(--accent2)}
.check-row input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--accent2);width:16px;height:16px}
.check-row span{font-size:13px;line-height:1.6;color:var(--text)}

/* ── Summary table ── */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:13px;gap:1rem}
.sum-row:last-child{border-bottom:none}
.sum-label{color:var(--muted);flex-shrink:0}
.sum-val{font-weight:500;text-align:right}

/* ── Spinner ── */
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Success screen ── */
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--ok-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.success-check{stroke:var(--ok)}

/* ── Download button ── */
.btn-dl{background:var(--surface2);color:var(--accent);border-color:var(--border);font-family:'Courier New',Courier,monospace;font-size:12px;letter-spacing:.04em}

/* ── Responsive ── */
@media(max-width:520px){
  .grid2,.grid-adr{grid-template-columns:1fr}
  .mod-grid{grid-template-columns:1fr 1fr}
  .main{padding:1rem .75rem}
  .heading{font-size:19px}
}
</style>
</head>

   SCHULUNGSINHALTE

const MODULES = [

<strong>3. Grenzwerte</strong> &#8212; Kritische Limits für jeden CCP definieren (z.B. +70 &#176;C Kerntemp.)
<strong>4. Überwachung</strong> &#8212; Systematische Messung und Kontrolle einrichten

        t: `Die kritische <strong>Gefahrenzone für Keimwachstum</strong> liegt zwischen +5 &#176;C und +65 &#176;C. In diesem Temperaturbereich können sich Krankheitserreger wie Salmonellen, Listerien oder Staphylokokken rasant vermehren.

Dies tötet die meisten Krankheitserreger einschließlich Salmonellen und Listerien zuverlässig ab. Bei bestimmten Produkten gelten höhere Anforderungen:

&#8226; Rollbraten und gefülltes Fleisch: mindestens +75 &#176;C

<strong>Bei Wunden:</strong> Wunde mit <strong>blauem, wasserfestem Pflaster</strong> (erkennbar in Lebensmitteln) abdecken, Einmalhandschuhe tragen. Wundinhalt oder Pflaster in Lebensmitteln &#8594; sofort melden und Produkte verwerfen!

let S = {
  screen: 'setup',
  cfg: { betrieb: CFG.BETRIEB_DEFAULT || '', ownerEmail: CFG.OWNER_EMAIL_DEFAULT || '' },
  emp: { vn: '', nn: '', adr: '', plz: '', ort: '', em: '', pos: '' },
  startedAt: null,
  cm: 0,
  phase: 'content', // 'content' | 'quiz' | 'confirm'
  cp: 0,
  qi: 0,
  qAnswered: false,
  qCorrect: false,
  qSelected: null,
  confirmChecked: false,
  finalChecked: false,
  sig: '',
  sendState: 'idle', // 'idle' | 'sending' | 'ok' | 'error' | 'noid'
  protokollText: '',
  sendError: '',
  sendError: '',
  modules: MODULES.map(() => ({ done: false, completedAt: null }))
};

function upd(patch, noRender) {
  S = Object.assign({}, S, patch);
  if (!noRender) {
    try { render(); }
    catch(e) {
      var errEl = document.getElementById('js-error');
      if (errEl) { errEl.style.display='block'; errEl.innerHTML='<strong>Render-Fehler:</strong><br>'+(e.message||e); }
    }
  }
}

/* =======================================================
   PROGRESS
======================================================= */
function getPct() {
  const d = S.modules.filter(x => x.done).length;
  const map = { setup: 0, employee: 8, overview: 15 + d * 13, module: 20 + d * 13, final: 95, sent: 100 };
  return map[S.screen] || 0;
}

/* =======================================================
   HELPERS
======================================================= */
function g(id) { return document.getElementById(id); }
function escHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatContent(t) {
  return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function screenOverview() {
  const done = S.modules.filter(x => x.done).length;
  const allDone = done === MODULES.length;
  return `
    ${allDone
      ? `<div class="alert alert-ok" style="margin-bottom:1.25rem">Alle ${MODULES.length} Module abgeschlossen. Bitte zum Abschluss weitergehend und das Protokoll absenden.</div>`
      : `<div class="alert alert-info" style="margin-bottom:1.25rem">Bitte alle ${MODULES.length} Module der Reihe nach durcharbeiten. Jedes Modul wird nach Abschluss des vorherigen freigeschaltet.</div>`
    }
    <div class="mod-grid">
      ${MODULES.map((m, i) => {
        const ms = S.modules[i];
        const isNext = !ms.done && (i === 0 || S.modules[i-1].done);
        const locked = !ms.done && !isNext;
        const cls = ms.done ? 'done' : isNext ? 'next' : 'locked';
        const click = locked ? '' : `onclick="openModule(${i})"`;
        return `<div class="mod-card ${cls}" ${click}>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
            <span class="mod-num">Modul ${i+1}</span>
            ${ms.done ? '<span class="badge badge-ok">Bestanden</span>' : isNext ? '<span class="badge badge-next">Aktuell</span>' : '<span class="badge badge-neutral">Gesperrt</span>'}
          </div>
          <div style="font-size:20px;margin-bottom:.375rem">${m.icon}</div>
          <div class="mod-title">${m.title}</div>
          <div class="mod-meta">${m.content.length} Abschnitte . ${m.quiz.length} Fragen</div>
          ${ms.done && ms.completedAt ? `<div style="font-size:11px;color:var(--ok);margin-top:.375rem;font-family:'Courier New',Courier,monospace">${new Date(ms.completedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr</div>` : ''}

      }).join('')}
    </div>
    <div class="nav-row" style="margin-top:1rem">
      <button class="btn" onclick="upd({screen:'employee'})">&#8592; Meine Daten</button>
      ${allDone ? `<button class="btn btn-success" onclick="upd({screen:'final',finalChecked:false,sendState:'idle'})">Zum Abschluss &#8594;</button>` : ''}
    </div>`;
}

function screenModule() {
  const m = MODULES[S.cm];
  const totalSteps = m.content.length + m.quiz.length + 1;
  const curStep = S.phase === 'content' ? S.cp : S.phase === 'quiz' ? m.content.length + S.qi : totalSteps - 1;
  const dots = Array.from({length: totalSteps}, (_, i) =>
    `<div class="dot ${i < curStep ? 'done-dot' : i === curStep ? 'active' : ''}"></div>`
  ).join('');

  if (S.phase === 'content') {
    const pg = m.content[S.cp];
    const isLast = S.cp >= m.content.length - 1;
    return `
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem">
        <button class="btn" style="padding:.375rem .75rem;font-size:13px" onclick="upd({screen:'overview'})">&#8592; Übersicht</button>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.icon} ${m.title}</div>
          <div style="font-size:12px;color:var(--muted)">Rechtsgrundlage: ${m.rechts}</div>
        </div>
        <span class="badge badge-neutral" style="flex-shrink:0">Modul ${S.cm+1}/${MODULES.length}</span>
      </div>
      <div class="dots">${dots}</div>
      <div class="card">
        <span class="label">Abschnitt ${S.cp+1} von ${m.content.length}</span>
        <div class="section-title">${pg.h}</div>
        <div class="content-text">${formatContent(pg.t)}</div>
      </div>
      <div class="nav-row">
        <button class="btn" onclick="contentBack()">${S.cp === 0 ? '&#8592; Übersicht' : '&#8592; Zurück'}</button>
        <button class="btn btn-primary" onclick="contentNext()">${isLast ? 'Zum Wissenstest &#8594;' : 'Weiter &#8594;'}</button>
      </div>`;
  }

  if (S.phase === 'quiz') {
    const q = m.quiz[S.qi];
    const isLast = S.qi >= m.quiz.length - 1;
    return `
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem">
        <div style="font-size:13px;font-weight:500">${m.icon} ${m.title} &#8212; Wissenstest</div>
        <span class="badge badge-next" style="margin-left:auto">Frage ${S.qi+1}/${m.quiz.length}</span>
      </div>
      <div class="dots">${dots}</div>
      <div class="card">
        <span class="label">Wissenstest &#8212; Frage ${S.qi + 1} von ${m.quiz.length}</span>
        <div class="section-title" style="margin-bottom:1.25rem">${q.q}</div>
        ${q.options.map((opt, i) => {
          let cls = '';
          if (S.qAnswered) cls = i === q.correct ? 'correct' : i === S.qSelected && i !== q.correct ? 'wrong' : '';
          return `<button class="q-option ${cls}" onclick="answerQuiz(${i})" ${S.qAnswered ? 'disabled' : ''}>${opt}</button>`;
        }).join('')}
        ${S.qAnswered && !S.qCorrect
          ? `<div class="alert alert-err" style="margin-top:.75rem">Nicht korrekt. Die richtige Antwort ist markiert grün. Bitte lies den Inhalt nochmal durch.</div>
             <button class="btn" style="margin-top:.25rem" onclick="retryQuiz()">&#8592; Abschnitte wiederholen</button>`
          : ''
        }
        ${S.qAnswered && S.qCorrect
          ? `<div class="alert alert-ok" style="margin-top:.75rem">Richtig! ${isLast ? 'Du hast alle Fragen bestanden.' : 'Weiter zur nächsten Frage.'}</div>
             <div class="nav-row" style="justify-content:flex-end">
               <button class="btn btn-primary" onclick="quizNext()">${isLast ? 'Modul abschließen &#8594;' : 'Nächste Frage &#8594;'}</button>
             </div>`
          : ''
        }
      </div>`;
  }

  if (S.phase === 'confirm') {
    return `
      <div class="dots">${dots}</div>
      <div class="card">
        <div style="font-size:32px;text-align:center;margin-bottom:.75rem">${m.icon}</div>
        <div class="section-title" style="text-align:center">Modul abgeschlossen!</div>
        <div class="subtext" style="text-align:center;margin-bottom:1.25rem">Du hast alle Inhalte von <strong>${m.title}</strong> durchgearbeitet und den Wissenstest bestanden.</div>
        <label class="check-row">
          <input type="checkbox" ${S.confirmChecked ? 'checked' : ''} onchange="upd({confirmChecked:this.checked})"/>
          <span>Ich bestätige, die Inhalte von Modul ${S.cm+1} (<strong>${m.title}</strong>) vollständig gelesen, verstanden und alle Wissensfragen korrekt beantwortet zu haben.</span>
        </label>
        <div class="nav-row" style="justify-content:flex-end;margin-top:1rem">
          <button class="btn btn-primary" ${!S.confirmChecked ? 'disabled' : ''} onclick="completeModule()">
            ${S.cm < MODULES.length - 1 ? 'Nächstes Modul &#8594;' : 'Alle Module abgeschlossen &#8594;'}
          </button>
        </div>
      </div>`;
  }
}

function screenFinal() {
  var e = S.emp;
  var now = new Date();
  var ds = now.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
  var ts = now.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
  var ready = S.finalChecked && S.sig.trim().length >= 3;
  var html = '<div class="card card-sm" style="margin-bottom:.875rem">';
  html += '<span class="label">Zusammenfassung</span>';
  html += '<div class="sum-row"><span class="sum-label">Betrieb</span><span class="sum-val">' + escHtml(S.cfg.betrieb) + '</span></div>';
  html += '<div class="sum-row"><span class="sum-label">Name</span><span class="sum-val">' + escHtml(e.vn) + ' ' + escHtml(e.nn) + '</span></div>';
  html += '<div class="sum-row"><span class="sum-label">Position</span><span class="sum-val">' + escHtml(e.pos) + '</span></div>';
  html += '<div class="sum-row"><span class="sum-label">Datum</span><span class="sum-val">' + ds + ' &middot; ' + ts + ' Uhr</span></div>';
  MODULES.forEach(function(m, i) {
    html += '<div class="sum-row"><span class="sum-label">' + escHtml(m.title) + '</span><span class="badge badge-ok">&#10003;</span></div>';
  });
  html += '</div>';
  html += '<div class="card">';
  html += '<div class="section-title">Digitale Unterschrift</div>';
  html += '<div class="fg">';
  html += '<label class="label">Vollständigen Namen eingeben</label>';
  html += '<input type="text" id="sig-in" placeholder="' + escHtml(e.vn) + ' ' + escHtml(e.nn) + '" value="' + escHtml(S.sig) + '" oninput="sigChanged(this.value)"/>';
  html += '</div>';
  html += '<label class="check-row">';
  html += '<input type="checkbox" id="final-ck" ' + (S.finalChecked ? 'checked' : '') + ' onchange="finalCkChanged(this.checked)"/>';
  html += '<span>Ich bestätige rechtsverbindlich, alle 6 Pflichtunterweisungsmodule vollständig absolviert und verstanden zu haben.</span>';
  html += '</label>';
  if (!S.sig.trim()) {
    html += '<div class="alert alert-info" style="margin-top:.75rem;font-size:13px">Bitte Namen eintragen, dann Checkbox anklicken.</div>';
  } else if (!S.finalChecked) {
    html += '<div class="alert alert-info" style="margin-top:.75rem;font-size:13px">Bitte Bestätigungs-Checkbox anklicken.</div>';
  }
  html += '<div class="nav-row" style="margin-top:1rem">';
  html += '<button class="btn" onclick="upd({screen:\'overview\'})">&#8592; Zurück</button>';
  if (ready) {
    html += '<button class="btn btn-primary" onclick="showProtokoll()">Protokoll erstellen &#8594;</button>';
  } else {
    html += '<button class="btn btn-primary" style="opacity:.4;cursor:not-allowed">Protokoll erstellen &#8594;</button>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function screenSent() {
  var e = S.emp;
  var st = S.sendState;
  var proto = S.protokollText || '';

  var statusHtml = '';
  if (st === 'sending') {
    statusHtml = '<div class="card card-sm" style="margin-bottom:1rem;display:flex;align-items:center;gap:.875rem"><div class="spinner"></div><span style="font-size:14px">Wird gesendet...</span></div>';
  } else if (st === 'ok') {
    statusHtml = '<div class="card card-sm" style="margin-bottom:1rem;background:var(--ok-bg);border-color:var(--ok)"><div style="font-size:14px;font-weight:500;color:var(--ok)">&#10003; Protokoll gesendet an: ' + escHtml(S.cfg.ownerEmail) + '</div></div>';
  } else if (st === 'error') {
    statusHtml = '<div class="card card-sm" style="margin-bottom:1rem;background:var(--err-bg);border-color:var(--err)"><div style="font-size:14px;font-weight:500;color:var(--err)">Fehler: ' + escHtml(S.sendError) + '</div><div style="font-size:12px;color:var(--err);margin-top:.25rem">Bitte Protokoll unten per Teilen senden.</div></div>';
  } else if (st === 'noid') {
    statusHtml = '<div class="card card-sm" style="margin-bottom:1rem;background:var(--warn-bg);border-color:#e8d8b0"><div style="font-size:14px;font-weight:500;color:var(--warn)">Keine Formspree-ID &#8212; bitte Protokoll manuell weiterleiten.</div></div>';
  }

  var shareHtml = '';
  if (navigator && navigator.share) {
    shareHtml = '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:.75rem" onclick="doShare()">Protokoll teilen (WhatsApp / E-Mail / AirDrop...)</button>';
  } else {
    shareHtml = '<div class="alert alert-info" style="font-size:12px;margin-bottom:.75rem">Teilen-Funktion nicht verfuegbar. Bitte Text unten kopieren und manuell an <strong>' + escHtml(S.cfg.ownerEmail) + '</strong> senden.</div>';
  }

  var taStyle = 'width:100%;height:180px;font-family:monospace;font-size:11px;line-height:1.5;padding:.625rem;border:1px solid #e2e0d8;border-radius:6px;background:#f8f7f3;color:#1a1916;resize:none;outline:none;margin-top:.5rem';

  var html = '<div style="padding:1rem 0 2rem">';
  html += '<div class="success-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="success-check"><polyline points="20 6 9 17 4 12"/></svg></div>';
  html += '<div class="heading" style="text-align:center;margin-bottom:.375rem">Schulung abgeschlossen</div>';
  html += '<div class="subtext" style="text-align:center;margin-bottom:1.25rem">Schulung von <strong>' + escHtml(e.vn) + ' ' + escHtml(e.nn) + '</strong> abgeschlossen</div>';
  html += statusHtml;
  html += '<div class="card" style="margin-bottom:1rem">';
  html += '<div class="section-title" style="margin-bottom:.75rem">Protokoll weiterleiten</div>';
  html += shareHtml;
  html += '<textarea readonly onclick="this.select()" style="' + taStyle + '">' + escHtml(proto) + '</textarea>';
  html += '</div>';
  html += '<div style="text-align:center;margin-top:.75rem">';
  html += '<button class="btn btn-success" onclick="nextEmployee()">Naechster Mitarbeiter &#8594;</button>';
  html += '</div>';
  html += '</div>';
  return html;
}


function sigChanged(val) {
  // Update state and re-render, then restore cursor to input
  S.sig = val;
  var el = document.getElementById('sig-in');
  var pos = el ? el.selectionStart : 0;
  render();
  var el2 = document.getElementById('sig-in');
  if (el2) { el2.focus(); el2.setSelectionRange(pos, pos); }
}

function finalCkChanged(val) {
  var sig = document.getElementById('sig-in');
  S.sig = sig ? sig.value : S.sig;
  upd({ finalChecked: val });
}

function showProtokoll() {
  if (!S.finalChecked || S.sig.trim().length < 3) return;
  upd({screen: 'sent', sendState: 'sending'});
  sendViaFormspree();
}

function sendViaFormspree() {
  var proto = '';
  try { proto = buildProtokoll().text; } catch(ex) { proto = 'Fehler: ' + ex.message; }
  var e = S.emp;
  var fid = (S.cfg.formspreeId || CFG.FORMSPREE_ID || '').trim();

  if (!fid) {
    // No Formspree ID - go straight to share screen
    upd({sendState: 'noid', protokollText: proto});
    return;
  }

  fetch('https://formspree.io/f/' + fid, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
    body: JSON.stringify({
      _subject: 'HACCP Protokoll - ' + e.vn + ' ' + e.nn + ' - ' + S.cfg.betrieb,
      _replyto: e.em,
      name: e.vn + ' ' + e.nn,
      position: e.pos,
      betrieb: S.cfg.betrieb,
      protokoll: proto
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      upd({sendState: 'ok', protokollText: proto});
    } else {
      upd({sendState: 'error', protokollText: proto, sendError: data.error || 'Unbekannter Fehler'});
    }
  })
  .catch(function(err) {
    upd({sendState: 'error', protokollText: proto, sendError: err.message || 'Netzwerkfehler'});
  });
}

function doShare() {
  var text = S.protokollText || '';
  var e = S.emp;
  var title = 'HACCP Protokoll - ' + e.vn + ' ' + e.nn;
  if (navigator.share) {
    navigator.share({ title: title, text: text })
    .catch(function(err) { if (err.name !== 'AbortError') console.log('Share error:', err); });
  } else {
    // Fallback: copy to clipboard
    if (navigator.clipboard && text) {
      navigator.clipboard.writeText(text).then(function() {
        alert('Protokoll in Zwischenablage kopiert!');
      }).catch(function() { alert('Bitte Text manuell kopieren.'); });
    }
  }
}

function doSetup() {
  var b = g('s-b') ? g('s-b').value.trim() : '';
  var e = g('s-e') ? g('s-e').value.trim() : '';
  var fid = g('s-fid') ? g('s-fid').value.trim() : CFG.FORMSPREE_ID;
  if (!b || !e) { alert('Bitte Betriebsname und E-Mail-Adresse eingeben.'); return; }
  if (!e.includes('@')) { alert('Bitte eine gültige E-Mail-Adresse eingeben.'); return; }
  upd({ cfg: { betrieb: b, ownerEmail: e, formspreeId: fid }, screen: 'employee' });
}

function doEmployee() {
  var v = {
    vn: g('e-vn') ? g('e-vn').value.trim() : '',
    nn: g('e-nn') ? g('e-nn').value.trim() : '',
    adr: g('e-ad') ? g('e-ad').value.trim() : '',
    plz: g('e-plz') ? g('e-plz').value.trim() : '',
    ort: g('e-ort') ? g('e-ort').value.trim() : '',
    em: g('e-em') ? g('e-em').value.trim() : '',
    pos: g('e-pos') ? g('e-pos').value.trim() : ''
  };
  if (Object.keys(v).some(function(k) { return !v[k]; })) { alert('Bitte alle Felder vollständig ausfüllen.'); return; }
  if (!v.em.includes('@')) { alert('Bitte eine gültige E-Mail-Adresse eingeben.'); return; }
  upd({ emp: v, screen: 'overview', startedAt: new Date().toISOString() });
}

function openModule(i) {
  upd({ screen: 'module', cm: i, phase: 'content', cp: 0, qi: 0, qAnswered: false, qCorrect: false, qSelected: null, confirmChecked: false });
}

function contentBack() {
  if (S.cp > 0) { upd({ cp: S.cp - 1 }); } else { upd({ screen: 'overview' }); }
}

function contentNext() {
  var m = MODULES[S.cm];
  if (S.cp < m.content.length - 1) {
    upd({ cp: S.cp + 1 });
  } else {
    upd({ phase: 'quiz', qi: 0, qAnswered: false, qCorrect: false, qSelected: null });
  }
}

function answerQuiz(i) {
  if (S.qAnswered) return;
  var q = MODULES[S.cm].quiz[S.qi];
  upd({ qAnswered: true, qCorrect: i === q.correct, qSelected: i });
}

function retryQuiz() {
  upd({ phase: 'content', cp: 0, qAnswered: false, qCorrect: false, qSelected: null });
}

function quizNext() {
  var m = MODULES[S.cm];
  if (S.qi < m.quiz.length - 1) {
    upd({ qi: S.qi + 1, qAnswered: false, qCorrect: false, qSelected: null });
  } else {
    upd({ phase: 'confirm', confirmChecked: false });
  }
}

function completeModule() {
  if (!S.confirmChecked) return;
  var newMods = S.modules.map(function(x, i) { return i === S.cm ? { done: true, completedAt: new Date().toISOString() } : x; });
  var allDone = newMods.every(function(x) { return x.done; });
  upd({ modules: newMods, screen: allDone ? 'final' : 'overview', finalChecked: false, sendState: 'idle' });
}

function buildProtokoll() {
  var e = S.emp;
  var now = new Date();
  var ds = now.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
  var ts = now.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
  var pid = 'HACCP-' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '-' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + '-' + e.nn.replace(/\s/g,'').toUpperCase().slice(0,6);
  var sep52 = '====================================================';
  var sep30 = '------------------------------';
  var moduleList = MODULES.map(function(m, i) {
    var st = S.modules[i];
    var ct = st.completedAt ? new Date(st.completedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '-';
    return '[OK] Modul ' + (i+1) + ': ' + m.title + '\n     Rechtsgrundlage: ' + m.rechts + '\n     ' + m.content.length + ' Lernabschnitte | ' + m.quiz.length + ' Wissensabfragen bestanden\n     Abgeschlossen: ' + ct + ' Uhr';
  }).join('\n\n');
  var text = 'HACCP & PFLICHTUNTERWEISUNG - SCHULUNGSPROTOKOLL\n' + sep52 + '\n\nProtokoll-ID: ' + pid + '\nBetrieb:      ' + S.cfg.betrieb + '\nDatum:        ' + ds + '  |  ' + ts + ' Uhr\n\nMITARBEITERDATEN\n' + sep30 + '\nName:         ' + e.vn + ' ' + e.nn + '\nAdresse:      ' + e.adr + ', ' + e.plz + ' ' + e.ort + '\nE-Mail:       ' + e.em + '\nPosition:     ' + e.pos + '\n\nABSOLVIERTE SCHULUNGSMODULE\n' + sep30 + '\n' + moduleList + '\n\nRECHTSVERBINDLICHE BESTAETIGUNG\n' + sep30 + '\n' + e.vn + ' ' + e.nn + ' bestaetigt hiermit rechtsverbindlich, alle 6 gesetzlich\nvorgeschriebenen Pflichtunterweisungsmodule vollstaendig durchgearbeitet,\nalle Wissensabfragen bestanden und die Inhalte verstanden zu haben.\n\nDigitale Unterschrift:  ' + S.sig + '\nZeitstempel:            ' + now.toISOString() + '\nSchulungsbeginn:        ' + (S.startedAt ? new Date(S.startedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr' : '-') + '\n\nRECHTSGRUNDLAGEN\n' + sep30 + '\nParagraph 4 LMHV | VO (EG) Nr. 852/2004 (HACCP)\nParagraph 43 Abs. 4 IfSG (Jahresbelehrung Lebensmittelhygiene)\nParagraph 12 ArbSchG (Arbeitsschutzunterweisung)\nParagraph 14 GefStoffV (Gefahrstoffunterweisung)\nVO (EU) Nr. 1169/2011 LMIV (Allergeninformation)\nArbStaettV | BGV A1 (Brandschutz & Erste Hilfe)\n\nAufbewahrungspflicht: mindestens 2 Jahre (Paragraph 6 LMHV).\nDieses Protokoll wurde automatisch durch das HACCP-Schulungsportal generiert.';
  return { pid: pid, ds: ds, ts: ts, text: text };
}

function nextEmployee() {
  upd({
    screen: 'employee',
    emp: { vn:'', nn:'', adr:'', plz:'', ort:'', em:'', pos:'' },
    startedAt: null, cm: 0, phase: 'content', cp: 0, qi: 0,
    qAnswered: false, qCorrect: false, qSelected: null,
    confirmChecked: false, finalChecked: false, sig: '', sendState: 'idle',
    protokollText: '', sendError: '',
    modules: MODULES.map(function() { return { done: false, completedAt: null }; })
  });
}

/* =======================================================
   RENDER
======================================================= */
function render() {
  const app = document.getElementById('app');
  const pbar = document.getElementById('pbar');
  const ttl = document.getElementById('topbar-title');
  const bdg = document.getElementById('topbar-badge');
  if (!app) return;

  pbar.style.width = getPct() + '%';

  const titles = { setup:'Schulungsportal', employee:'Mitarbeiterdaten', overview:'Modulübersicht', module: MODULES[S.cm]?.title||'', final:'Abschluss', sent:'Abgeschlossen' };
  ttl.textContent = titles[S.screen] || '';

  const done = S.modules.filter(x => x.done).length;
  if (S.screen !== 'setup' && S.screen !== 'employee') {
    bdg.style.display = '';
    bdg.textContent = `${done}/${MODULES.length} Module`;
  } else {
    bdg.style.display = 'none';
  }

  const screens = { setup: screenSetup, employee: screenEmployee, overview: screenOverview, module: screenModule, final: screenFinal, sent: screenSent };
  app.innerHTML = screens[S.screen] ? screens[S.screen]() : '';
  window.scrollTo(0, 0);
}

// Safe initial render with visible error fallback
try {
  render();
} catch(e) {
  var errEl = document.getElementById('js-error');
  var appEl = document.getElementById('app');
  var msg = '<strong>App-Fehler:</strong><br>' + (e.message||'Unbekannt') + '<br><small>Bitte Screenshot machen und melden.</small>';
  if (errEl) { errEl.style.display = 'block'; errEl.innerHTML = msg; }
  if (appEl) { appEl.innerHTML = '<div style="padding:1.5rem;font-family:sans-serif;color:#8b1a1a">' + msg + '</div>'; }
}
</script>
</body>
</html>
