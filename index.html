<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HACCP Schulungsportal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root {
  --bg:       #f2f0eb;
  --surface:  #ffffff;
  --surface2: #f8f7f3;
  --border:   #e2e0d8;
  --text:     #1a1916;
  --muted:    #6b6960;
  --accent:   #1a3a2a;
  --accent2:  #2d5c41;
  --ok:       #1e6b3e;
  --ok-bg:    #e8f5ee;
  --err:      #8b1a1a;
  --err-bg:   #fdf0f0;
  --info:     #1a3a6b;
  --info-bg:  #eef3fd;
  --warn-bg:  #fdf6e8;
  --warn:     #7a4f0d;
  --r:        10px;
  --r-sm:     6px;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
a{color:var(--accent2)}

/* ── Layout ── */
.shell{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--accent);color:#fff;padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.08em;opacity:.9;white-space:nowrap}
.topbar-title{font-size:14px;font-weight:500;white-space:nowrap}
.topbar-sep{opacity:.25;flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.progress-wrap{height:3px;background:rgba(255,255,255,.15);position:relative}
.progress-fill{height:100%;background:rgba(255,255,255,.6);transition:width .4s ease}
.main{flex:1;padding:2rem 1rem;max-width:720px;width:100%;margin:0 auto}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.25rem}
.card-sm{padding:1rem 1.25rem}

/* ── Typography ── */
.label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:.375rem}
.heading{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:.5rem}
.subtext{font-size:14px;color:var(--muted);line-height:1.65}
.section-title{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:.875rem}

/* ── Forms ── */
.fg{margin-bottom:1rem}
.fg:last-child{margin-bottom:0}
input[type=text],input[type=email],select{width:100%;padding:.625rem .875rem;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface2);transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(45,92,65,.1)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-adr{display:grid;grid-template-columns:110px 1fr;gap:1rem}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:#c8c6be}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-success{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-success:hover{filter:brightness(1.1)}
.nav-row{display:flex;gap:.75rem;justify-content:space-between;margin-top:1.25rem}

/* ── Alerts ── */
.alert{padding:.75rem 1rem;border-radius:var(--r-sm);font-size:13px;line-height:1.55;margin-bottom:.875rem;border:1px solid}
.alert-info{background:var(--info-bg);color:var(--info);border-color:#c8d7f5}
.alert-ok{background:var(--ok-bg);color:var(--ok);border-color:#b8dfc8}
.alert-err{background:var(--err-bg);color:var(--err);border-color:#f0c8c8}
.alert-warn{background:var(--warn-bg);color:var(--warn);border-color:#e8d8b0}

/* ── Module grid ── */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.875rem}
.mod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1.125rem;cursor:pointer;transition:all .2s;position:relative}
.mod-card:hover:not(.locked){border-color:var(--accent2);box-shadow:0 2px 12px rgba(45,92,65,.12);transform:translateY(-1px)}
.mod-card.next{border-color:var(--accent2);background:linear-gradient(135deg,#fff 0%,#f0f7f2 100%)}
.mod-card.done{border-color:var(--ok);background:var(--ok-bg)}
.mod-card.locked{opacity:.45;cursor:not-allowed}
.mod-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em}
.mod-title{font-size:14px;font-weight:500;margin:.25rem 0 .375rem;line-height:1.35}
.mod-meta{font-size:12px;color:var(--muted)}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-next{background:var(--info-bg);color:var(--info)}
.badge-neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* ── Content viewer ── */
.content-text{font-size:15px;line-height:1.8;color:var(--text);white-space:pre-line}
.content-text strong{font-weight:600;color:var(--accent)}

/* ── Progress dots ── */
.dots{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .25s}
.dot.active{background:var(--accent2);width:24px;border-radius:4px}
.dot.done-dot{background:var(--ok)}

/* ── Quiz ── */
.q-option{display:block;width:100%;text-align:left;padding:.75rem 1rem;margin-bottom:.625rem;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);cursor:pointer;transition:all .18s;line-height:1.45}
.q-option:hover:not(:disabled){border-color:var(--accent2);background:#f0f7f2}
.q-option:disabled{cursor:not-allowed}
.q-option.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);font-weight:500}
.q-option.wrong{background:var(--err-bg);border-color:var(--err);color:var(--err)}

/* ── Checklist row ── */
.check-row{display:flex;align-items:flex-start;gap:.75rem;padding:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;margin-top:.875rem;transition:border-color .15s}
.check-row:hover{border-color:var(--accent2)}
.check-row input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--accent2);width:16px;height:16px}
.check-row span{font-size:13px;line-height:1.6;color:var(--text)}

/* ── Summary table ── */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:13px;gap:1rem}
.sum-row:last-child{border-bottom:none}
.sum-label{color:var(--muted);flex-shrink:0}
.sum-val{font-weight:500;text-align:right}

/* ── Spinner ── */
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Success screen ── */
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--ok-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.success-check{stroke:var(--ok)}

/* ── Config banner ── */
.config-needed{background:var(--warn-bg);border:1px solid #e8d8b0;border-radius:var(--r);padding:.875rem 1rem;font-size:13px;color:var(--warn);margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:.625rem;line-height:1.55}

/* ── Responsive ── */
@media(max-width:520px){
  .grid2,.grid-adr{grid-template-columns:1fr}
  .mod-grid{grid-template-columns:1fr 1fr}
  .main{padding:1rem .75rem}
  .heading{font-size:19px}
}
</style>
</head>

        h: "Was ist HACCP?",
        t: `HACCP steht für <strong>Hazard Analysis and Critical Control Points</strong> und ist ein präventives System zur Lebensmittelsicherheit. Es identifiziert, bewertet und kontrolliert biologische, chemische und physikalische Gefahren entlang der gesamten Lebensmittelkette.

Die Einhaltung ist für alle Gastronomiebetriebe gesetzlich verpflichtend gemäß § 4 LMHV und der EU-Verordnung (EG) Nr. 852/2004. Bei Verstößen drohen Bußgelder, Betriebsschließungen und strafrechtliche Konsequenzen.`
      },
      {
        h: "Die 7 HACCP-Prinzipien",
        t: `<strong>1. Gefahrenanalyse</strong> — Alle möglichen Gefahren identifizieren und bewerten
<strong>2. CCPs festlegen</strong> — Kritische Kontrollpunkte im Prozess bestimmen
<strong>3. Grenzwerte</strong> — Kritische Limits für jeden CCP definieren (z.B. +70 °C Kerntemp.)
<strong>4. Überwachung</strong> — Systematische Messung und Kontrolle einrichten
<strong>5. Korrekturmaßnahmen</strong> — Reaktion bei Grenzwertüberschreitungen festlegen
<strong>6. Verifizierung</strong> — Regelmäßige Überprüfung der Wirksamkeit
<strong>7. Dokumentation</strong> — Lückenlose schriftliche Aufzeichnung aller Maßnahmen`
      },
      {
        h: "Deine täglichen Pflichten",
        t: `Als Mitarbeiter bist du gesetzlich und arbeitsrechtlich verpflichtet:

• Alle Kontrollmaßnahmen gewissenhaft und vollständig durchzuführen
• Abweichungen <strong>sofort</strong> der Küchenleitung zu melden
• Alle Formulare vollständig, leserlich und wahrheitsgemäß auszufüllen
• Kein Formular vorzufüllen oder nachträglich zu korrigieren
• Bei Unsicherheiten immer zu fragen — niemals zu raten

Nicht dokumentiert = nicht gemacht. Das gilt für Behörden und bei Haftungsfragen.`
      },
      {
        h: "Dokumentationspflicht & Aufbewahrung",
        t: `Alle HACCP-Aufzeichnungen müssen mindestens <strong>2 Jahre</strong> aufbewahrt werden. Bei einer amtlichen Lebensmittelkontrolle durch das Veterinäramt müssen alle Unterlagen sofort und vollständig vorgelegt werden können.

Folgende Formulare sind in unserem Betrieb täglich zu führen:
• <strong>F-01</strong> — Kühlgeräte-Temperaturkontrolle (morgens + abends)
• <strong>F-02</strong> — Speisen-Temperaturkontrolle (Garen, Warmhalten, Kühlen)
• <strong>F-03</strong> — Wareneingangskontrolle (bei jeder Lieferung)
• <strong>F-05</strong> — Reinigungs- und Desinfektionsprotokoll (nach jeder Reinigung)`

    quiz: [

        q: "Was bedeutet die Abkürzung CCP?",

      {

        correct: 2
      },
      {
        q: "Was bedeutet der Grundsatz 'Nicht dokumentiert = nicht gemacht'?",
        options: [
          "Mündliche Kontrollen reichen aus",
          "Nur bei Beanstandungen dokumentieren",
          "Jede Kontrolle muss schriftlich festgehalten werden",
          "Dokumentation ist optional"

    content: [
      {
        h: "Die Gefahrenzone",
        t: `Die kritische <strong>Gefahrenzone für Keimwachstum</strong> liegt zwischen +5 °C und +65 °C. In diesem Temperaturbereich können sich Krankheitserreger wie Salmonellen, Listerien oder Staphylokokken rasant vermehren.

Lebensmittel sollten diese Zone so kurz wie möglich durchlaufen — <strong>maximal 2 Stunden</strong> in der Gefahrenzone. Danach: entweder auf ≥ +65 °C erhitzen oder auf ≤ +8 °C kühlen.`
      },
      {
        h: "Korrekte Kühltemperaturen (CCP-1 & CCP-2)",
        t: `<strong>Kühlschrank:</strong> maximal +4 °C — täglich morgens und abends messen (Formular F-01)
<strong>Tiefkühlgeräte:</strong> maximal −18 °C — täglich kontrollieren
<strong>Frischfleisch & Fisch:</strong> maximal +2 °C
<strong>Aufgetautes:</strong> immer sofort verarbeiten, nie wieder einfrieren

Auftauen: <strong>ausschließlich im Kühlschrank</strong> bei ≤ +4 °C oder in der Mikrowelle direkt vor der Verarbeitung.

Bei Abweichung: sofort Küchenleitung informieren und in Formular F-01 dokumentieren!`
      },
      {
        h: "Gartemperaturen (CCP-3)",
        t: `<strong>Pflicht-Kerntemperatur beim Garen: ≥ +70 °C für mindestens 2 Minuten.</strong>

Dies tötet die meisten Krankheitserreger einschließlich Salmonellen und Listerien zuverlässig ab. Bei bestimmten Produkten gelten höhere Anforderungen:

• Geflügel und Hackfleisch: mindestens +75 °C
• Rollbraten und gefülltes Fleisch: mindestens +75 °C

Messung: immer mit kalibriertem Kerntemperaturthermometer. Thermometer vorher desinfizieren! Ergebnis in Formular F-02 eintragen.`
      },
      {
        h: "Warmhalten, Kühlen & Ausgabe (CCP-4 & CCP-5)",
        t: `<strong>Warmhalten:</strong> mindestens +65 °C — regelmäßige Kontrolle!
<strong>Abkühlen nach dem Garen:</strong> innerhalb von 2 Stunden auf ≤ +8 °C kühlen
<strong>Kalt servieren:</strong> maximal +7 °C
<strong>Ausgabe warm:</strong> mindestens +65 °C

<strong>Maximal zulässige Verweilzeit</strong> in der Gefahrenzone (+5 °C bis +65 °C): 2 Stunden gesamt.

Bei jeder Abweichung: sofortige Korrekturmaßnahme einleiten und in Formular F-02 dokumentieren. Im Zweifel: <strong>Produkt verwerfen</strong> — Gästesicherheit geht vor Verlust!`
      }
    ],
    quiz: [
      {
        q: "Welche Kerntemperatur muss beim Garen mindestens erreicht werden?",
        options: ["+60 °C für 1 Minute", "+65 °C für 2 Minuten", "+70 °C für mindestens 2 Minuten", "+80 °C für 30 Sekunden"],
        correct: 2
      },
      {
        q: "Wie lange darf das Abkühlen von gegartem Essen auf ≤ +8 °C maximal dauern?",

      },

  {

    title: "Hygiene & Reinigung",
    icon: "🧼",

      {
        h: "Persönliche Hygiene — der wichtigste Schutzfaktor",
        t: `<strong>Hände waschen — wann?</strong>
• Vor Arbeitsbeginn und nach jeder Pause
• Nach dem Toilettengang (<strong>absolut verpflichtend</strong>)
• Nach Berühren roher Lebensmittel (Fleisch, Geflügel, Eier)
• Nach dem Naseputzen, Niesen oder Husten
• Nach Abfallentsorgung und Reinigungsarbeiten
• Nach Berühren von Geld, Handy oder fremden Oberflächen

<strong>Korrekte Technik:</strong> Mindestens 30 Sekunden mit Seife waschen, alle Bereiche inkl. Fingerzwischenräume, dann gründlich abspülen und mit Einmalhandtuch trocknen. Anschließend desinfizieren.`
      },
      {
        h: "Kreuzkontamination verhindern",
        t: `<strong>Goldene Regel:</strong> Rohe und gegarte Lebensmittel IMMER getrennt aufbewahren, transportieren und verarbeiten!

<strong>Farbcode Schneidbretter (Pflicht):</strong>
• 🔴 <strong>Rot</strong> — rohes Fleisch (Rind, Schwein, Lamm)
• 🟡 <strong>Gelb</strong> — rohes Geflügel (höchste Kontaminationsgefahr!)
• 🔵 <strong>Blau</strong> — Fisch und Meeresfrüchte
• 🟢 <strong>Grün</strong> — Obst und Gemüse
• ⚪ <strong>Weiß</strong> — Milchprodukte / allgemeine Nutzung

Nie Brett-Farben vermischen. Bretter nach Gebrauch immer sofort reinigen und desinfizieren!`
      },
      {
        h: "Reinigungs- und Desinfektionsplan (CCP-6)",
        t: `Reinigung ≠ Desinfektion! Reinigung entfernt sichtbare Verschmutzungen. Desinfektion tötet Keime ab — beides ist nötig!

<strong>Pflicht-Intervalle:</strong>
• Arbeitsflächen + Schneidbretter: nach JEDEM Einsatz
• Messer und Küchengeräte: nach Gebrauch (Spülmaschine ≥ 60 °C)
• Kühlschränke: wöchentlich ausräumen und reinigen
• Fritteuse: täglich Krümel, wöchentlich komplett
• Boden Küche: täglich nach Betriebsschluss

Alle durchgeführten Maßnahmen sind zwingend in Formular <strong>F-04/F-05</strong> zu dokumentieren!`

<strong>Bei Wunden:</strong> Wunde mit <strong>blauem, wasserfestem Pflaster</strong> (erkennbar in Lebensmitteln) abdecken, Einmalhandschuhe tragen. Wundinhalt oder Pflaster in Lebensmitteln → sofort melden und Produkte verwerfen!

<strong>Bei Erkrankung:</strong> Durchfall, Erbrechen, infizierte Wunden, Gelbsucht, Fieber → Küchenleitung sofort informieren → Tätigkeitsverbot bis zur vollständigen Genesung. Wiederaufnahme nur nach ärztlicher Freigabe möglich.`

      {
        h: "Die 14 Hauptallergene — Kennzeichnungspflicht",
        t: `Gemäß EU-Verordnung 1169/2011 (LMIV) und der deutschen LMIDV müssen <strong>14 Hauptallergene</strong> deklariert werden:

1. Glutenhaltiges Getreide (Weizen, Roggen, Gerste, Hafer, Dinkel)
2. Krebstiere und Erzeugnisse daraus
3. Eier und Erzeugnisse daraus
4. Fisch und Erzeugnisse daraus
5. Erdnüsse und Erzeugnisse daraus
6. Sojabohnen und Erzeugnisse daraus
7. Milch und Milcherzeugnisse (inkl. Laktose)
8. Schalenfrüchte (Nüsse: Mandeln, Haselnüsse, Walnüsse usw.)
9. Sellerie und Erzeugnisse daraus
10. Senf und Erzeugnisse daraus

let S = {
  screen: 'setup',
  cfg: { betrieb: CFG.BETRIEB_DEFAULT || '', ownerEmail: '' },
  emp: { vn: '', nn: '', adr: '', plz: '', ort: '', em: '', pos: '' },
  startedAt: null,
  cm: 0,
  phase: 'content', // 'content' | 'quiz' | 'confirm'
  cp: 0,
  qi: 0,
  qAnswered: false,
  qCorrect: false,
  qSelected: null,
  confirmChecked: false,
  finalChecked: false,
  sig: '',
  sendState: 'idle', // 'idle' | 'sending' | 'done' | 'error'
  sendError: '',
  modules: MODULES.map(() => ({ done: false, completedAt: null }))

function upd(patch, noRender) {
  S = Object.assign({}, S, patch);
  if (!noRender) render();
}

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
function getPct() {
  const d = S.modules.filter(x => x.done).length;
  const map = { setup: 0, employee: 8, overview: 15 + d * 13, module: 20 + d * 13, final: 95, sent: 100 };
  return map[S.screen] || 0;
}

function g(id) { return document.getElementById(id); }
function escHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatContent(t) {
  return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function screenOverview() {
  const done = S.modules.filter(x => x.done).length;
  const allDone = done === MODULES.length;
  return `
    ${allDone
      ? `<div class="alert alert-ok" style="margin-bottom:1.25rem">Alle ${MODULES.length} Module abgeschlossen. Bitte zum Abschluss weitergehend und das Protokoll absenden.</div>`
      : `<div class="alert alert-info" style="margin-bottom:1.25rem">Bitte alle ${MODULES.length} Module der Reihe nach durcharbeiten. Jedes Modul wird nach Abschluss des vorherigen freigeschaltet.</div>`
    }
    <div class="mod-grid">
      ${MODULES.map((m, i) => {
        const ms = S.modules[i];
        const isNext = !ms.done && (i === 0 || S.modules[i-1].done);
        const locked = !ms.done && !isNext;
        const cls = ms.done ? 'done' : isNext ? 'next' : 'locked';
        const click = locked ? '' : `onclick="openModule(${i})"`;
        return `<div class="mod-card ${cls}" ${click}>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
            <span class="mod-num">Modul ${i+1}</span>
            ${ms.done ? '<span class="badge badge-ok">Bestanden</span>' : isNext ? '<span class="badge badge-next">Aktuell</span>' : '<span class="badge badge-neutral">Gesperrt</span>'}
          </div>
          <div style="font-size:20px;margin-bottom:.375rem">${m.icon}</div>
          <div class="mod-title">${m.title}</div>
          <div class="mod-meta">${m.content.length} Abschnitte · ${m.quiz.length} Fragen</div>
          ${ms.done && ms.completedAt ? `<div style="font-size:11px;color:var(--ok);margin-top:.375rem;font-family:'DM Mono',monospace">${new Date(ms.completedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr</div>` : ''}
        </div>`;
      }).join('')}
    </div>
    <div class="nav-row" style="margin-top:1rem">
      <button class="btn" onclick="upd({screen:'employee'})">← Meine Daten</button>
      ${allDone ? `<button class="btn btn-success" onclick="upd({screen:'final',finalChecked:false,sendState:'idle'})">Zum Abschluss →</button>` : ''}
    </div>`;
}

function screenModule() {
  const m = MODULES[S.cm];
  const totalSteps = m.content.length + m.quiz.length + 1;
  const curStep = S.phase === 'content' ? S.cp : S.phase === 'quiz' ? m.content.length + S.qi : totalSteps - 1;
  const dots = Array.from({length: totalSteps}, (_, i) =>
    `<div class="dot ${i < curStep ? 'done-dot' : i === curStep ? 'active' : ''}"></div>`
  ).join('');

  if (S.phase === 'content') {
    const pg = m.content[S.cp];
    const isLast = S.cp >= m.content.length - 1;
    return `
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem">
        <button class="btn" style="padding:.375rem .75rem;font-size:13px" onclick="upd({screen:'overview'})">← Übersicht</button>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.icon} ${m.title}</div>
          <div style="font-size:12px;color:var(--muted)">Rechtsgrundlage: ${m.rechts}</div>
        </div>
        <span class="badge badge-neutral" style="flex-shrink:0">Modul ${S.cm+1}/${MODULES.length}</span>
      </div>
      <div class="dots">${dots}</div>
      <div class="card">
        <span class="label">Abschnitt ${S.cp+1} von ${m.content.length}</span>
        <div class="section-title">${pg.h}</div>
        <div class="content-text">${formatContent(pg.t)}</div>
      </div>
      <div class="nav-row">
        <button class="btn" onclick="contentBack()">${S.cp === 0 ? '← Übersicht' : '← Zurück'}</button>
        <button class="btn btn-primary" onclick="contentNext()">${isLast ? 'Zum Wissenstest →' : 'Weiter →'}</button>
      </div>`;
  }

  if (S.phase === 'quiz') {
    const q = m.quiz[S.qi];
    const isLast = S.qi >= m.quiz.length - 1;
    return `
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem">
        <div style="font-size:13px;font-weight:500">${m.icon} ${m.title} — Wissenstest</div>
        <span class="badge badge-next" style="margin-left:auto">Frage ${S.qi+1}/${m.quiz.length}</span>
      </div>
      <div class="dots">${dots}</div>
      <div class="card">
        <span class="label">Wissenstest — Frage ${S.qi + 1} von ${m.quiz.length}</span>
        <div class="section-title" style="margin-bottom:1.25rem">${q.q}</div>
        ${q.options.map((opt, i) => {
          let cls = '';
          if (S.qAnswered) cls = i === q.correct ? 'correct' : i === S.qSelected && i !== q.correct ? 'wrong' : '';
          return `<button class="q-option ${cls}" onclick="answerQuiz(${i})" ${S.qAnswered ? 'disabled' : ''}>${opt}</button>`;
        }).join('')}
        ${S.qAnswered && !S.qCorrect
          ? `<div class="alert alert-err" style="margin-top:.75rem">Nicht korrekt. Die richtige Antwort ist markiert grün. Bitte lies den Inhalt nochmal durch.</div>
             <button class="btn" style="margin-top:.25rem" onclick="retryQuiz()">← Abschnitte wiederholen</button>`
          : ''
        }
        ${S.qAnswered && S.qCorrect
          ? `<div class="alert alert-ok" style="margin-top:.75rem">Richtig! ${isLast ? 'Du hast alle Fragen bestanden.' : 'Weiter zur nächsten Frage.'}</div>
             <div class="nav-row" style="justify-content:flex-end">
               <button class="btn btn-primary" onclick="quizNext()">${isLast ? 'Modul abschließen →' : 'Nächste Frage →'}</button>
             </div>`
          : ''
        }
      </div>`;
  }

  if (S.phase === 'confirm') {
    return `
      <div class="dots">${dots}</div>
      <div class="card">
        <div style="font-size:32px;text-align:center;margin-bottom:.75rem">${m.icon}</div>
        <div class="section-title" style="text-align:center">Modul abgeschlossen!</div>
        <div class="subtext" style="text-align:center;margin-bottom:1.25rem">Du hast alle Inhalte von <strong>${m.title}</strong> durchgearbeitet und den Wissenstest bestanden.</div>
        <label class="check-row">
          <input type="checkbox" ${S.confirmChecked ? 'checked' : ''} onchange="upd({confirmChecked:this.checked})"/>
          <span>Ich bestätige, die Inhalte von Modul ${S.cm+1} (<strong>${m.title}</strong>) vollständig gelesen, verstanden und alle Wissensfragen korrekt beantwortet zu haben.</span>
        </label>
        <div class="nav-row" style="justify-content:flex-end;margin-top:1rem">
          <button class="btn btn-primary" ${!S.confirmChecked ? 'disabled' : ''} onclick="completeModule()">
            ${S.cm < MODULES.length - 1 ? 'Nächstes Modul →' : 'Alle Module abgeschlossen →'}
          </button>
        </div>
      </div>`;
  }
}

function screenFinal() {
  const e = S.emp;
  const now = new Date();
  const ds = now.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
  const ts = now.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
  return `
    <div class="card card-sm" style="margin-bottom:.875rem">
      <span class="label">Protokollübersicht</span>
      <div class="sum-row"><span class="sum-label">Betrieb</span><span class="sum-val">${escHtml(S.cfg.betrieb)}</span></div>
      <div class="sum-row"><span class="sum-label">Mitarbeiter</span><span class="sum-val">${escHtml(e.vn)} ${escHtml(e.nn)}</span></div>
      <div class="sum-row"><span class="sum-label">Position</span><span class="sum-val">${escHtml(e.pos)}</span></div>
      <div class="sum-row"><span class="sum-label">Adresse</span><span class="sum-val">${escHtml(e.adr)}, ${escHtml(e.plz)} ${escHtml(e.ort)}</span></div>
      <div class="sum-row"><span class="sum-label">E-Mail</span><span class="sum-val">${escHtml(e.em)}</span></div>
      <div class="sum-row"><span class="sum-label">Datum</span><span class="sum-val">${ds} um ${ts} Uhr</span></div>
    </div>
    <div class="card card-sm" style="margin-bottom:.875rem">
      <span class="label">Absolvierte Module</span>
      ${MODULES.map((m, i) => `
        <div class="sum-row">
          <span class="sum-label">${m.icon} Modul ${i+1}: ${m.title}</span>
          <span class="badge badge-ok">Bestanden</span>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="section-title">Digitale Bestätigung & Versand</div>
      <div class="subtext" style="margin-bottom:1rem">Gib deinen vollständigen Namen als digitale Unterschrift ein. Das Protokoll wird dann per E-Mail an die Betriebsleitung gesendet.</div>
      <div class="fg">
        <label class="label">Vollständiger Name (digitale Unterschrift)</label>
        <input type="text" id="sig-in" placeholder="${escHtml(e.vn)} ${escHtml(e.nn)}" value="${escHtml(S.sig)}" oninput="upd({sig:this.value},true);document.getElementById('sig-in').value=this.value"/>
      </div>
      <label class="check-row">
        <input type="checkbox" ${S.finalChecked ? 'checked' : ''} onchange="upd({finalChecked:this.checked})"/>
        <span>Ich, <strong>${escHtml(e.vn)} ${escHtml(e.nn)}</strong>, bestätige hiermit rechtsverbindlich, alle 6 Pflichtunterweisungsmodule vollständig durchgearbeitet, die Wissensabfragen bestanden und die Inhalte verstanden zu haben. Ich werde die erlernten Hygienevorschriften und Sicherheitsregeln im Arbeitsalltag einhalten.</span>
      </label>
      ${S.sendState === 'sending'
        ? `<div style="display:flex;align-items:center;gap:.875rem;margin-top:1rem;padding:.875rem;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border)"><div class="spinner"></div><span style="font-size:14px;color:var(--muted)">Protokoll wird per E-Mail gesendet…</span></div>`
        : ''
      }
      ${S.sendState === 'error'
        ? `<div class="alert alert-err" style="margin-top:.75rem">${escHtml(S.sendError)}</div>`
        : ''
      }
      <div class="nav-row" style="margin-top:1rem">
        <button class="btn" onclick="upd({screen:'overview'})">← Zurück</button>
        <button class="btn btn-primary" ${(!S.finalChecked || S.sig.trim().length < 3 || S.sendState === 'sending') ? 'disabled' : ''} onclick="doSend()">
          Protokoll absenden →
        </button>
      </div>
    </div>`;
}

function screenSent() {
  const e = S.emp;
  return `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:380px;text-align:center;padding:2rem 1rem">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="success-check">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="heading" style="margin-bottom:.5rem">Schulung abgeschlossen</div>
      <div class="subtext" style="max-width:440px;margin-bottom:1.5rem">
        Das Protokoll für <strong>${escHtml(e.vn)} ${escHtml(e.nn)}</strong> wurde erfolgreich per E-Mail an <strong>${escHtml(S.cfg.ownerEmail)}</strong> gesendet.
      </div>
      <div class="card" style="width:100%;max-width:460px;text-align:left;margin-bottom:1.5rem">
        ${MODULES.map((m,i) => `<div class="sum-row"><span class="sum-label">${m.icon} ${m.title}</span><span class="badge badge-ok">Bestanden</span></div>`).join('')}
      </div>
      <button class="btn btn-primary" onclick="nextEmployee()">Nächster Mitarbeiter →</button>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════ */
function doSetup() {
  const b = g('s-b')?.value.trim(), e = g('s-e')?.value.trim();
  if (!b || !e) { alert('Bitte Betriebsname und E-Mail-Adresse eingeben.'); return; }
  if (!e.includes('@')) { alert('Bitte eine gültige E-Mail-Adresse eingeben.'); return; }
  upd({ cfg: { betrieb: b, ownerEmail: e }, screen: 'employee' });
}

function doEmployee() {
  const v = {
    vn: g('e-vn')?.value.trim(), nn: g('e-nn')?.value.trim(),
    adr: g('e-ad')?.value.trim(), plz: g('e-plz')?.value.trim(),
    ort: g('e-ort')?.value.trim(), em: g('e-em')?.value.trim(),
    pos: g('e-pos')?.value.trim()
  };
  if (Object.values(v).some(x => !x)) { alert('Bitte alle Felder vollständig ausfüllen.'); return; }
  if (!v.em.includes('@')) { alert('Bitte eine gültige E-Mail-Adresse eingeben.'); return; }
  upd({ emp: v, screen: 'overview', startedAt: new Date().toISOString() });
}

function openModule(i) {
  upd({ screen: 'module', cm: i, phase: 'content', cp: 0, qi: 0, qAnswered: false, qCorrect: false, qSelected: null, confirmChecked: false });
}

function contentBack() {
  S.cp > 0 ? upd({ cp: S.cp - 1 }) : upd({ screen: 'overview' });
}

function contentNext() {
  const m = MODULES[S.cm];
  S.cp < m.content.length - 1
    ? upd({ cp: S.cp + 1 })
    : upd({ phase: 'quiz', qi: 0, qAnswered: false, qCorrect: false, qSelected: null });
}

function answerQuiz(i) {
  if (S.qAnswered) return;
  const q = MODULES[S.cm].quiz[S.qi];
  upd({ qAnswered: true, qCorrect: i === q.correct, qSelected: i });
}

function retryQuiz() {
  upd({ phase: 'content', cp: 0, qAnswered: false, qCorrect: false, qSelected: null });
}

function quizNext() {
  const m = MODULES[S.cm];
  S.qi < m.quiz.length - 1
    ? upd({ qi: S.qi + 1, qAnswered: false, qCorrect: false, qSelected: null })
    : upd({ phase: 'confirm', confirmChecked: false });
}

function completeModule() {
  if (!S.confirmChecked) return;
  const newMods = S.modules.map((x, i) => i === S.cm ? { done: true, completedAt: new Date().toISOString() } : x);
  const allDone = newMods.every(x => x.done);
  upd({ modules: newMods, screen: allDone ? 'final' : 'overview', finalChecked: false, sendState: 'idle' });
}

async function doSend() {
  if (!S.finalChecked || S.sig.trim().length < 3) return;
  upd({ sendState: 'sending' });

  const e = S.emp;
  const now = new Date();
  const ds = now.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
  const ts = now.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
  const pid = `HACCP-${Date.now()}`;

  const moduleList = MODULES.map((m, i) => {
    const st = S.modules[i];
    const ct = st.completedAt ? new Date(st.completedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '-';
    return `Modul ${i+1}: ${m.title}\n  Rechtsgrundlage: ${m.rechts}\n  ${m.content.length} Lernabschnitte | ${m.quiz.length} Wissensabfragen bestanden\n  Abgeschlossen: ${ct} Uhr`;
  }).join('\n\n');

  const protokoll = `HACCP & PFLICHTUNTERWEISUNG — SCHULUNGSPROTOKOLL
${'='.repeat(52)}

Protokoll-ID: ${pid}
Betrieb:      ${S.cfg.betrieb}
Datum:        ${ds}  |  ${ts} Uhr

MITARBEITERDATEN
${'─'.repeat(30)}
Name:         ${e.vn} ${e.nn}
Adresse:      ${e.adr}, ${e.plz} ${e.ort}
E-Mail:       ${e.em}
Position:     ${e.pos}

ABSOLVIERTE SCHULUNGSMODULE
${'─'.repeat(30)}
${moduleList}

RECHTSVERBINDLICHE BESTÄTIGUNG
${'─'.repeat(30)}
${e.vn} ${e.nn} bestätigt hiermit rechtsverbindlich, alle 6 gesetzlich
vorgeschriebenen Pflichtunterweisungsmodule vollständig durchgearbeitet,
alle Wissensabfragen bestanden und die Inhalte verstanden zu haben.
Der/Die Mitarbeiter/in verpflichtet sich, die erlernten Hygienevorschriften
und Sicherheitsregeln im Arbeitsalltag einzuhalten.

Digitale Unterschrift:  ${S.sig}
Zeitstempel:            ${now.toISOString()}
Schulungsbeginn:        ${S.startedAt ? new Date(S.startedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr' : '-'}

RECHTSGRUNDLAGEN
${'─'.repeat(30)}
§ 4 LMHV | VO (EG) Nr. 852/2004 (HACCP)
§ 43 Abs. 4 IfSG (Jahresbelehrung Lebensmittelhygiene)
§ 12 ArbSchG (Arbeitsschutzunterweisung)
§ 14 GefStoffV (Gefahrstoffunterweisung)
VO (EU) Nr. 1169/2011 LMIV (Allergeninformation)
ArbStättV | BGV A1 (Brandschutz & Erste Hilfe)

Dieses Protokoll wurde automatisch durch das HACCP-Schulungsportal generiert.
Aufbewahrungspflicht: mindestens 2 Jahre (§ 6 LMHV).`;

  try {
    if (CFG.EMAILJS_PUBLIC_KEY === 'DEIN_PUBLIC_KEY') {
      // Demo-Modus: Protokoll im Dialog anzeigen
      await new Promise(r => setTimeout(r, 1500));
      console.log('PROTOKOLL (Demo-Modus):\n', protokoll);
      alert('Demo-Modus: EmailJS nicht konfiguriert.\nDas Protokoll wurde in der Browser-Konsole ausgegeben.\nBitte EmailJS in der CFG-Sektion konfigurieren.');
      upd({ sendState: 'done', screen: 'sent' });
      return;
    }

    emailjs.init(CFG.EMAILJS_PUBLIC_KEY);
    await emailjs.send(CFG.EMAILJS_SERVICE_ID, CFG.EMAILJS_TEMPLATE_ID, {
      to_email:    S.cfg.ownerEmail,
      to_name:     'Betriebsleitung',
      betrieb:     S.cfg.betrieb,
      ma_name:     `${e.vn} ${e.nn}`,
      ma_position: e.pos,
      ma_email:    e.em,
      datum:       `${ds} ${ts}`,
      protokoll_id: pid,
      protokoll:   protokoll,
      reply_to:    e.em
    });
    upd({ sendState: 'done', screen: 'sent' });
  } catch (err) {
    console.error('EmailJS Fehler:', err);
    upd({ sendState: 'error', sendError: `E-Mail konnte nicht gesendet werden: ${err.text || err.message || 'Unbekannter Fehler'}. Bitte EmailJS-Konfiguration prüfen.` });
  }
}

function nextEmployee() {
  upd({
    screen: 'employee',
    emp: { vn:'', nn:'', adr:'', plz:'', ort:'', em:'', pos:'' },
    startedAt: null, cm: 0, phase: 'content', cp: 0, qi: 0,
    qAnswered: false, qCorrect: false, qSelected: null,
    confirmChecked: false, finalChecked: false, sig: '', sendState: 'idle',
    modules: MODULES.map(() => ({ done: false, completedAt: null }))
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  const pbar = document.getElementById('pbar');
  const ttl = document.getElementById('topbar-title');
  const bdg = document.getElementById('topbar-badge');
  if (!app) return;

  pbar.style.width = getPct() + '%';

  const titles = { setup:'Schulungsportal', employee:'Mitarbeiterdaten', overview:'Modulübersicht', module: MODULES[S.cm]?.title||'', final:'Abschluss', sent:'Abgeschlossen' };
  ttl.textContent = titles[S.screen] || '';

  const done = S.modules.filter(x => x.done).length;
  if (S.screen !== 'setup' && S.screen !== 'employee') {
    bdg.style.display = '';
    bdg.textContent = `${done}/${MODULES.length} Module`;
  } else {
    bdg.style.display = 'none';
  }

  const screens = { setup: screenSetup, employee: screenEmployee, overview: screenOverview, module: screenModule, final: screenFinal, sent: screenSent };
  app.innerHTML = screens[S.screen] ? screens[S.screen]() : '';
  window.scrollTo(0, 0);
}

render();
</script>
</body>
</html>
